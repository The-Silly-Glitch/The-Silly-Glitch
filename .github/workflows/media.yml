# Visit https://github.com/lowlighter/metrics#-documentation for full reference
name: Media
on:
  # Schedule updates (each hour)
  schedule: [{cron: "0 * * * *"}]
  # Lines below let you run workflow manually and on each commit
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  media-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: media.svg
          # Current configuration doesn't require a GitHub token
          token: NOT_NEEDED

          # Options
          user: The-Silly-Glitch
          template: classic
          base: ""
          config_octicon: yes
          config_timezone: Asia/Calcutta
          config_twemoji: yes
          plugin_anilist: yes
          plugin_anilist_limit: 3
          plugin_anilist_limit_characters: 10
          plugin_anilist_medias: manga
          plugin_anilist_sections: favorites
          plugin_anilist_shuffle: yes
          plugin_anilist_user: PandaHeartz
          plugin_fortune: yes
          plugin_music: yes
          plugin_music_limit: 6
          plugin_music_mode: playlist
          plugin_music_playlist: https://music.youtube.com/playlist?list=PLmWEwEuj8WrN2i-K2bi-z8jX8yj0He1Em&si=NukV8loyWQk3INNZ
          plugin_music_provider: youtube
          plugin_music_time_range: short
          plugin_music_top_type: tracks
          plugin_music_user: honeysh_kun
